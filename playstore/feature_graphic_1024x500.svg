<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="850" cy="100" r="200" fill="url(#glow)"/>
  <circle cx="150" cy="400" r="150" fill="url(#glow)"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="100" x2="1024" y2="100"/>
    <line x1="0" y1="200" x2="1024" y2="200"/>
    <line x1="0" y1="300" x2="1024" y2="300"/>
    <line x1="0" y1="400" x2="1024" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
  </g>

  <!-- Heart icon (left side) -->
  <g transform="translate(160, 130)">
    <circle cx="80" cy="80" r="90" fill="white" opacity="0.12"/>
    <path d="M80 140 C80 140 20 100 20 65 C20 45 37 33 52 33 C65 33 75 43 80 52 C85 43 95 33 108 33 C123 33 140 45 140 65 C140 100 80 140 80 140Z" fill="white" opacity="0.9"/>
    <polyline points="35,80 55,80 63,62 73,98 83,72 93,88 100,78 110,80 125,80" fill="none" stroke="#6D28D9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="120" cy="45" r="16" fill="white" opacity="0.9"/>
    <line x1="120" y1="37" x2="120" y2="53" stroke="#6D28D9" stroke-width="3" stroke-linecap="round"/>
    <line x1="112" y1="45" x2="128" y2="45" stroke="#6D28D9" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Main text -->
  <text x="380" y="180" font-family="Arial, sans-serif" font-weight="900" font-size="56" fill="white" letter-spacing="-1">Patologias de</text>
  <text x="380" y="245" font-family="Arial, sans-serif" font-weight="900" font-size="56" fill="white" letter-spacing="-1">Enfermeria</text>

  <!-- Subtitle -->
  <text x="380" y="290" font-family="Arial, sans-serif" font-weight="400" font-size="22" fill="white" opacity="0.8">Tu guia clinica de bolsillo</text>

  <!-- Feature pills -->
  <g transform="translate(380, 320)">
    <rect x="0" y="0" width="160" height="36" rx="18" fill="white" opacity="0.15"/>
    <text x="80" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="white">151 Patologias</text>

    <rect x="175" y="0" width="140" height="36" rx="18" fill="white" opacity="0.15"/>
    <text x="245" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="white">17 Escalas</text>

    <rect x="330" y="0" width="180" height="36" rx="18" fill="white" opacity="0.15"/>
    <text x="420" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="white">NANDA-NIC-NOC</text>
  </g>

  <!-- Bottom feature icons -->
  <g transform="translate(380, 390)">
    <g>
      <rect x="0" y="0" width="36" height="36" rx="10" fill="white" opacity="0.15"/>
      <text x="18" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">📋</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-weight="500" font-size="14" fill="white" opacity="0.8">Quiz interactivo</text>
    </g>
    <g transform="translate(200, 0)">
      <rect x="0" y="0" width="36" height="36" rx="10" fill="white" opacity="0.15"/>
      <text x="18" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">📱</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-weight="500" font-size="14" fill="white" opacity="0.8">Funciona offline</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="492" width="1024" height="8" fill="#A78BFA" opacity="0.5"/>
</svg>
