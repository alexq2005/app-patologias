<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2D6FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- White circle -->
  <circle cx="256" cy="240" r="130" fill="white" opacity="0.95"/>
  <!-- Heart with pulse -->
  <path d="M256 310 C256 310 180 260 180 215 C180 190 200 175 220 175 C237 175 250 188 256 198 C262 188 275 175 292 175 C312 175 332 190 332 215 C332 260 256 310 256 310Z" fill="url(#heart)" opacity="0.15"/>
  <path d="M256 300 C256 300 188 255 188 215 C188 193 205 180 222 180 C237 180 249 190 256 200 C263 190 275 180 290 180 C307 180 324 193 324 215 C324 255 256 300 256 300Z" fill="#6D28D9"/>
  <!-- ECG line -->
  <polyline points="195,230 225,230 235,210 245,250 255,220 265,240 275,225 285,230 315,230" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Plus sign -->
  <circle cx="330" cy="185" r="22" fill="#6D28D9" opacity="0.8"/>
  <line x1="330" y1="175" x2="330" y2="195" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="320" y1="185" x2="340" y2="185" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- App name -->
  <text x="256" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="36" fill="white" letter-spacing="-0.5">PATOLOGIAS</text>
  <text x="256" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500" font-size="22" fill="white" opacity="0.8">ENFERMERIA</text>
</svg>
